# =============================================================================
# PgBouncer Configuration - Connection Pooling for Weelo Backend
# =============================================================================
# Purpose: Enable 100K concurrent users with minimal database connections
#
# Architecture:
#   - App Instances → PgBouncer (Connection Pool) → Postgres (Actual DB)
#   - 500-1000 app instances with pool_size=25 → only 25 DB connections needed
# =============================================================================

[databases]
# Primary database (writes)
weelo_db = host=db-host port=5432 dbname=weelo_db user=weelo_user password=CHANGE_ME

# Read replica (for queries) - set up when ready
# weelo_db_readonly = host=replica-host port=5432 dbname=weelo_db user=weelo_user password=CHANGE_ME

[pgbouncer]
# Listen on port 6432 (different from PostgreSQL default 5432)
listen_addr = 0.0.0.0
listen_port = 6432

# Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Connection Pool Mode
pool_mode = transaction
# Options:
#   - session: One connection per client (not recommended)
#   - transaction: Return connection after each transaction (RECOMMENDED)
#   - statement: Return connection after each query (not recommended)

# Connection Pool Limits for Weelo Scale
max_client_conn = 10000        # Maximum connections from ALL app instances
default_pool_size = 25         # Max actual DB connections per pool (adjust based on server RAM)
reserve_pool_size = 5          # Extra connections for traffic spikes
reserve_pool_timeout = 3       # Seconds to wait for reserve pool

# Connection Timeouts
server_idle_timeout = 600     # Close idle DB connections after 10 minutes
server_lifetime = 3600        # Recycle DB connections after 1 hour (prevents long connection issues)
server_connect_timeout = 15  # Give DB 15s to accept connections
query_timeout = 300           # Kill slow queries after 5 minutes
client_idle_timeout = 300       # Disconnect idle clients after 5 minutes

# Logging (for debugging)
log_connections = 1          # Log new connections
log_disconnections = 1         # Log disconnections
log_pooler_errors = 1          # Log pool errors

# Performance Tuning
# Increase these if you notice connection errors
server_reset_query_always = 0   # Reset query cache on new connections (costly)
ignore_startup_parameters = extra_float_digits

# Stats
stats_users = stats           # Allow stats user to query pgbouncer

# Disable detailed query logging in production (for performance)
# log_pooler_errors is sufficient
# log_statement = none         # Uncomment to enable query logging (slow!)

# =============================================================================
# RECOMMENDED SETTINGS FOR YOUR SCALE
# =============================================================================
#
# With 500-1000 backend instances:
#   max_client_conn = 10000 (10K max concurrent connections)
#   default_pool_size = 25 (25 connections to actual DB)
#   → Can handle 10K concurrent requests with only 25 DB connections
#   → Each instance averages ~10-20 connections
#   → Even if 100 instances reconnect, they share the pool
#
# Memory Calculation (for default_pool_size=25):
#   - Each Postgres connection: ~2MB (work_mem connections)
#   - 25 connections × 2MB = ~50MB (plus overhead)
#   - Plus server_idle_timeout = 600s to manage bursts
#   - Well within typical server RAM (8-32GB)
# =============================================================================
