// F-C-78 · Weelo canonical enums (mirrors prisma/schema.prisma exactly)
//
// Source of truth for enum surfaces shared across backend + captain + customer.
// Codegen emits TypeScript (`enums.generated.ts`) and is designed to also emit
// Kotlin sealed classes for downstream consumers (P10).
//
// Naming convention:
//   - Proto constants are UPPER_SNAKE (proto convention); codegen preserves
//     wire-level string values exactly as Prisma writes them (lowercase for
//     VehicleStatus/AssignmentStatus/BookingStatus, UPPERCASE for HoldPhase).
//   - Each enum has a sentinel `*_UNKNOWN = 0` for forward-compat wire drift.
//     `fromBackendString(raw)` at consumer side returns `'UNKNOWN'` on miss.
//
// DO NOT edit enum values without a matching Prisma migration. Downstream
// sealed-class exhaustiveness (Kotlin) will break compilation on drift.

syntax = "proto3";

package weelo.contracts;

// ----------------------------------------------------------------------------
// HoldPhase — prisma/schema.prisma:118-123 (UPPERCASE wire values)
// ----------------------------------------------------------------------------
enum HoldPhase {
  HOLD_PHASE_UNKNOWN = 0;
  HOLD_PHASE_FLEX = 1;       // Phase 1: 90s base, +30s per assignment, 130s cap
  HOLD_PHASE_CONFIRMED = 2;  // Phase 2: trucks locked, 180s cap
  HOLD_PHASE_EXPIRED = 3;    // Hold expired
  HOLD_PHASE_RELEASED = 4;   // Hold released by transporter
}

// ----------------------------------------------------------------------------
// VehicleStatus — prisma/schema.prisma:44-50 (lowercase wire values)
// ----------------------------------------------------------------------------
enum VehicleStatus {
  VEHICLE_STATUS_UNKNOWN = 0;
