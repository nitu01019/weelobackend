  VEHICLE_STATUS_ON_HOLD = 2;     // "on_hold"
  VEHICLE_STATUS_IN_TRANSIT = 3;  // "in_transit"
  VEHICLE_STATUS_MAINTENANCE = 4; // "maintenance"
  VEHICLE_STATUS_INACTIVE = 5;    // "inactive"
}

