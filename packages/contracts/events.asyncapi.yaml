asyncapi: 3.0.0
info:
  title: Weelo Socket Event Contracts
  version: 1.0.0
  description: |
    Canonical event-name registry for Weelo socket traffic. Source of truth for
    backend, captain, and customer repos. Codegen emits:
      - TypeScript: `events.generated.ts` (consumed by src/shared/services/socket.service.ts)
      - Kotlin: `SocketEvent.kt` (stamped into captain + customer constants)
    Owned by F-C-52. Rename/extend here → codegen → consumers. Do NOT add event
    names anywhere else. CI `contracts:verify` greps for literal `socket.emit(...)`.

# Channels are grouped by direction (server->client vs client->server) to mirror
# the legacy SocketEvent map in src/shared/services/socket.service.ts:137-237.
channels:
  # ==========================================================================
  # SERVER → CLIENT (lifecycle + notifications)
  # ==========================================================================
  connected:
    address: connected
    messages: {}
  booking_updated:
    address: booking_updated
    messages: {}
  truck_assigned:
    address: truck_assigned
    messages: {}
  trip_assigned:
    address: trip_assigned
    messages: {}
  location_updated:
    address: location_updated
    messages: {}
  assignment_status_changed:
    address: assignment_status_changed
    messages: {}
  new_broadcast:
    address: new_broadcast
    messages: {}
  truck_confirmed:
    address: truck_confirmed
    messages: {}

  # ----- Booking lifecycle -----
  booking_expired:
