# ---------------------------------------------------------------------------
# Legacy aliases — additional TS member names mapping to an existing wire value.
# Kept for backwards compat with call sites like `SocketEvent.BROADCAST_CANCELLED`.
# NOT new events; codegen emits `<memberName>: '<existing wire value>'`.
# Format: `<MEMBER_NAME>: <existing_address>`
# ---------------------------------------------------------------------------
x-event-aliases:
  BROADCAST_CANCELLED: order_cancelled
