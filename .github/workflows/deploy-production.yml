name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 318774499084.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: weelo-backend
  ECS_CLUSTER: weelocluster
  ECS_SERVICE: weelobackendtask-service-joxh3c0r
  ALB_URL: http://weelo-alb-380596483.ap-south-1.elb.amazonaws.com

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Run tests (jest)
        run: npx jest --forceExit
        env:
          NODE_ENV: test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: |
          VERSION_TAG="${{ github.sha }}"
          echo "tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "latest=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image-tag.outputs.image }}
            ${{ steps.image-tag.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to ECS
        run: |
          echo "🚀 Deploying ${{ steps.image-tag.outputs.tag }} to ECS..."
          HEALTH_GRACE_SECONDS=180
          DEPLOY_START_EPOCH=$(date +%s)
          echo "DEPLOY_START_EPOCH=$DEPLOY_START_EPOCH" >> $GITHUB_ENV
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --health-check-grace-period-seconds $HEALTH_GRACE_SECONDS \
            --region ${{ env.AWS_REGION }} > /dev/null
          echo "✅ ECS deployment triggered (healthCheckGrace=${HEALTH_GRACE_SECONDS}s, startEpoch=${DEPLOY_START_EPOCH})"

      - name: Wait for ECS service to stabilize
        run: |
          echo "⏳ Waiting for ECS service to stabilize (rolling deploy)..."
          MAX_RETRIES=90
          SLEEP_SECONDS=20
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "  Attempt $ATTEMPT/$MAX_RETRIES..."

            # Get service state
            SERVICE_JSON=$(aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE }} \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0]' \
              --output json)

            RUNNING=$(echo "$SERVICE_JSON" | python3 -c "import json,sys; s=json.load(sys.stdin); print(s['runningCount'])")
            DESIRED=$(echo "$SERVICE_JSON" | python3 -c "import json,sys; s=json.load(sys.stdin); print(s['desiredCount'])")
            PENDING=$(echo "$SERVICE_JSON" | python3 -c "import json,sys; s=json.load(sys.stdin); print(s.get('pendingCount', 0))")
            PRIMARY_ID=$(echo "$SERVICE_JSON" | python3 -c "import json,sys; s=json.load(sys.stdin); d=next((x for x in s.get('deployments',[]) if x.get('status')=='PRIMARY'),{}); print(d.get('id',''))")
            PRIMARY_STATE=$(echo "$SERVICE_JSON" | python3 -c "import json,sys; s=json.load(sys.stdin); d=next((x for x in s.get('deployments',[]) if x.get('status')=='PRIMARY'),{}); print(d.get('rolloutState','UNKNOWN'))")
            DEPLOYMENTS_STATE=$(echo "$SERVICE_JSON" | python3 -c "import json,sys; s=json.load(sys.stdin); print(' | '.join([f\"{d.get('status')}:{d.get('rolloutState','UNKNOWN')} running={d.get('runningCount')}/{d.get('desiredCount')}\" for d in s.get('deployments',[])]))")

            echo "  Running: $RUNNING/$DESIRED  Pending: $PENDING  PrimaryState: $PRIMARY_STATE"
            echo "  Deployments: $DEPLOYMENTS_STATE"

            if [ "$RUNNING" = "$DESIRED" ] && [ "$PENDING" = "0" ] && [ "$PRIMARY_STATE" = "COMPLETED" ]; then
              echo "✅ ECS service is stable! ($RUNNING/$DESIRED tasks running)"
              break
            fi

            # Check for rollback/circuit-breaker on the CURRENT primary deployment only.
            # Older FAILED active deployments can remain in history and should not fail this run.
            if [ "$PRIMARY_STATE" = "FAILED" ]; then
              echo "❌ ECS circuit breaker triggered — deployment FAILED and rolled back"
              echo "📋 Recent ECS service events:"
              aws ecs describe-services \
                --cluster ${{ env.ECS_CLUSTER }} \
                --services ${{ env.ECS_SERVICE }} \
                --region ${{ env.AWS_REGION }} \
                --query 'services[0].events[0:12].[createdAt,message]' \
                --output table || true
              exit 1
            fi

            # Fail fast only for deployment-failed events that match CURRENT primary deployment
            # and happened after this workflow's deploy trigger time.
            CURRENT_DEPLOY_FAILED_EVENT=$(echo "$SERVICE_JSON" | python3 -c "import json,sys,datetime; s=json.load(sys.stdin); pid='''$PRIMARY_ID'''.strip(); cutoff=int('''${DEPLOY_START_EPOCH:-0}'''); to_epoch=lambda ts:int(datetime.datetime.fromisoformat(ts.replace('Z','+00:00')).timestamp()) if ts else 0; print(any((pid and pid in e.get('message','') and 'deployment failed' in e.get('message','') and to_epoch(e.get('createdAt',''))>=cutoff) for e in s.get('events',[])[:25]))")
            if [ "$CURRENT_DEPLOY_FAILED_EVENT" = "True" ]; then
              echo "❌ ECS reported deployment failure for current primary deployment: $PRIMARY_ID"
              echo "📋 Recent ECS service events:"
              aws ecs describe-services \
                --cluster ${{ env.ECS_CLUSTER }} \
                --services ${{ env.ECS_SERVICE }} \
                --region ${{ env.AWS_REGION }} \
                --query 'services[0].events[0:12].[createdAt,message]' \
                --output table || true
              exit 1
            fi

            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              sleep $SLEEP_SECONDS
            fi
          done

          if [ $ATTEMPT -ge $MAX_RETRIES ]; then
            echo "❌ Timed out waiting for ECS to stabilize after $((MAX_RETRIES * SLEEP_SECONDS))s"
            echo "📋 Recent ECS service events:"
            aws ecs describe-services \
              --cluster ${{ env.ECS_CLUSTER }} \
              --services ${{ env.ECS_SERVICE }} \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].events[0:12].[createdAt,message]' \
              --output table || true
            exit 1
          fi

      - name: Health check
        run: |
          echo "🏥 Running health check..."
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "  Attempt $i/$MAX_RETRIES..."
            HTTP_CODE=$(curl -s -o /tmp/health_response.json -w "%{http_code}" \
              --max-time 15 \
              ${{ env.ALB_URL }}/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_CODE)"
              cat /tmp/health_response.json | python3 -m json.tool 2>/dev/null || cat /tmp/health_response.json
              break
            fi
            echo "  Health check returned HTTP $HTTP_CODE, retrying in ${RETRY_DELAY}s..."
            if [ $i -lt $MAX_RETRIES ]; then
              sleep $RETRY_DELAY
            fi
          done
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed after $MAX_RETRIES attempts (last HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Deployment summary
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "=========================================="
          echo "  Commit: ${{ github.sha }}"
          echo "  Image:  ${{ steps.image-tag.outputs.image }}"
          echo "  Health: ${{ env.ALB_URL }}/health"
          echo "=========================================="

      - name: Deployment failed
        if: failure()
        run: |
          echo ""
          echo "=========================================="
          echo "❌ DEPLOYMENT FAILED"
          echo "=========================================="
          echo "  Commit: ${{ github.sha }}"
          echo "  Check ECS events:"
          echo "  aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} --region ${{ env.AWS_REGION }}"
          echo "  Check logs:"
          echo "  aws logs tail weelobackendtask --follow --region ${{ env.AWS_REGION }}"
          echo ""
          echo "  Recent stopped tasks (diagnostic):"
          TASK_ARNS=$(aws ecs list-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service-name ${{ env.ECS_SERVICE }} \
            --desired-status STOPPED \
            --region ${{ env.AWS_REGION }} \
            --query 'taskArns[0:5]' \
            --output text || true)
          if [ -n "$TASK_ARNS" ]; then
            aws ecs describe-tasks \
              --cluster ${{ env.ECS_CLUSTER }} \
              --tasks $TASK_ARNS \
              --region ${{ env.AWS_REGION }} \
              --query 'tasks[].{taskArn:taskArn,lastStatus:lastStatus,stopCode:stopCode,stoppedReason:stoppedReason,containers:containers[].{name:name,exitCode:exitCode,reason:reason,lastStatus:lastStatus}}' \
              --output table || true
          fi
          echo "=========================================="
          echo "  ECS circuit breaker will auto-rollback to last stable task definition."
